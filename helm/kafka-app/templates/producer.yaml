apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer
spec:
  replicas: {{ .Values.producer.replicas }}
  selector:
    matchLabels:
      app: producer
  template:
    metadata:
      labels:
        app: producer
    spec:
      containers:
      - name: producer
        image: {{ .Values.producer.image }}
        env:
        - name: KAFKA_BROKER_URL
          value: "{{ .Values.kafka.broker }}"
        - name: KAFKA_TOPIC
          value: "{{ .Values.kafka.topic }}"