apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: producer
  template:
    metadata:
      labels:
        app: producer
    spec:
      containers:
      - name: producer
        image: 844331382461.dkr.ecr.us-east-2.amazonaws.com/producer:latest
        imagePullPolicy: Always
        env:
        - name: KAFKA_BROKER_URL
          value: "b-2.mskkafka.nybnzy.c4.kafka.us-east-2.amazonaws.com:9094,b-1.mskkafka.nybnzy.c4.kafka.us-east-2.amazonaws.com:9094"
        - name: KAFKA_TOPIC
          value: "posts"